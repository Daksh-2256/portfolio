<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temp - Premium Temperature Converter</title>

  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1), 
                  transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ---- DARK MODE (Aurorean Dusk) ---- */
    [data-theme="dark"] {
      --bg: #090616;
      --card-bg: rgba(22, 17, 43, 0.7);
      --card-border: rgba(139, 92, 246, 0.25);
      --input-bg: rgba(9, 6, 22, 0.6);
      --label: #d8b4fe;
      --text: #ffffff;
      --subtext: #94a3b8;
      --border: rgba(139, 92, 246, 0.2);
      --placeholder: #4b5563;
      --accent: #f43f5e;
      --accent2: #8b5cf6;
      --btn-grad1: #f43f5e;
      --btn-grad2: #8b5cf6;
      --btn-hover1: #e11d48;
      --btn-hover2: #7c3aed;
      --result-bg: rgba(244, 63, 94, 0.08);
      --result-border: #f43f5e;
      --error-bg: rgba(239, 68, 68, 0.1);
      --error-border: #ef4444;
      --error-text: #fca5a5;
      --formula-bg: rgba(139, 92, 246, 0.08);
      --formula-border: #8b5cf6;
      --formula-label: #d8b4fe;
      --formula-text: #cbd5e1;
      --divider: rgba(139, 92, 246, 0.15);
      --hint: #64748b;
      --footer: #475569;
      --toggle-bg: rgba(139, 92, 246, 0.2);
      --glow-opacity: 0.25;
    }

    /* ---- LIGHT MODE (Soft Rose Petal & Lavender) ---- */
    [data-theme="light"] {
      --bg: #f5f3ff;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(139, 92, 246, 0.15);
      --input-bg: #fcfbff;
      --label: #6d28d9;
      --text: #1e1b4b;
      --subtext: #6b7280;
      --border: #ddd6fe;
      --placeholder: #9ca3af;
      --accent: #e11d48;
      --accent2: #7c3aed;
      --btn-grad1: #e11d48;
      --btn-grad2: #7c3aed;
      --btn-hover1: #be123c;
      --btn-hover2: #6d28d9;
      --result-bg: rgba(225, 29, 72, 0.05);
      --result-border: #e11d48;
      --error-bg: #fff1f2;
      --error-border: #ef4444;
      --error-text: #b91c1c;
      --formula-bg: rgba(124, 58, 237, 0.05);
      --formula-border: #7c3aed;
      --formula-label: #6d28d9;
      --formula-text: #4b5563;
      --divider: #e9e3ff;
      --hint: #9ca3af;
      --footer: #9ca3af;
      --toggle-bg: #ddd6fe;
      --glow-opacity: 0.1;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 10% 20%, rgba(244, 63, 94, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* ---- Background Glow Blobs ---- */
    .bg-glow {
      position: absolute;
      width: 45vw;
      height: 45vw;
      max-width: 500px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: var(--glow-opacity);
      pointer-events: none;
      animation: floatGlow 15s ease-in-out infinite;
    }

    .bg-glow-1 {
      background: var(--accent);
      top: -10%;
      left: -10%;
    }

    .bg-glow-2 {
      background: var(--accent2);
      bottom: -10%;
      right: -10%;
      animation-delay: -7.5s;
    }

    @keyframes floatGlow {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      50% {
        transform: translate(40px, 40px) scale(1.1);
      }
    }

    /* ---- TOGGLE BUTTON ---- */
    .toggle-wrap {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }

    .toggle-btn {
      background: var(--toggle-bg);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(8px);
    }

    .toggle-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
    }

    /* ---- header ---- */
    .header {
      text-align: center;
      margin-bottom: 35px;
      z-index: 1;
    }

    .header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header h1 span {
      background: linear-gradient(135deg, var(--btn-grad1), var(--btn-grad2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      font-size: 15px;
      color: var(--subtext);
      font-weight: 400;
    }

    /* ---- card ---- */
    .card {
      background-color: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 45px 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      z-index: 1;
      position: relative;
    }

    /* ---- input section ---- */
    .input-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--label);
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-field {
      width: 100%;
      padding: 15px 18px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background-color: var(--input-bg);
      margin-bottom: 24px;
    }

    .input-field:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
    }

    .input-field::placeholder {
      color: var(--placeholder);
    }

    /* ---- dropdown ---- */
    .select-field {
      width: 100%;
      padding: 15px 18px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      outline: none;
      color: var(--text);
      background-color: var(--input-bg);
      margin-bottom: 30px;
      cursor: pointer;
    }

    .select-field:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
    }

    /* ---- convert button ---- */
    .convert-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--btn-grad1), var(--btn-grad2));
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 20px rgba(244, 63, 94, 0.2);
    }

    .convert-btn:hover {
      background: linear-gradient(135deg, var(--btn-hover1), var(--btn-hover2));
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(244, 63, 94, 0.35);
    }

    .convert-btn:active {
      transform: translateY(0);
    }

    /* ---- result box ---- */
    .result-box {
      margin-top: 25px;
      padding: 22px;
      border-radius: 16px;
      text-align: center;
      display: none;
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-box.success {
      background-color: var(--result-bg);
      border: 1.5px solid var(--result-border);
      display: block;
    }

    .result-box.success .result-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--subtext);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .result-box.success .result-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 42px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .result-box.success .result-unit {
      font-size: 14px;
      color: var(--subtext);
      margin-top: 6px;
    }

    .result-box.error {
      background-color: var(--error-bg);
      border: 1.5px solid var(--error-border);
      display: block;
    }

    .result-box.error .error-msg {
      font-size: 14px;
      color: var(--error-text);
      font-weight: bold;
    }

    /* ---- divider ---- */
    .divider {
      width: 100%;
      height: 1px;
      background-color: var(--divider);
      margin: 25px 0;
    }

    /* ---- formula box ---- */
    .formula-box {
      background-color: var(--formula-bg);
      border: 1px solid var(--formula-border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-top: 20px;
      display: none;
      animation: slideDown 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .formula-box.show {
      display: block;
    }

    .formula-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      color: var(--formula-label);
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .formula-text {
      font-size: 13px;
      color: var(--formula-text);
    }

    /* ---- footer ---- */
    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: var(--footer);
      text-align: center;
      z-index: 1;
    }

    /* ---- responsive ---- */
    @media (max-width: 500px) {
      .card { padding: 35px 25px; }
      .header h1 { font-size: 30px; }
    }

  </style>
</head>
<body>

  <!-- Floating Ambient Glowing Blobs -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <!-- Dark / Light Toggle -->
  <div class="toggle-wrap">
    <button class="toggle-btn" onclick="toggleMode()" id="toggleBtn">
      ☀️ Light Mode
    </button>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>🌡️ Temperature <span>Converter</span></h1>
    <p>Convert temperature between Celsius, Fahrenheit and Kelvin</p>
  </div>

  <!-- Main Card -->
  <div class="card">

    <label class="input-label" for="tempInput">Enter Temperature Value</label>
    <input
      type="number"
      id="tempInput"
      class="input-field"
      placeholder="e.g. 100"
    />

    <label class="input-label" for="conversionType">Select Conversion Type</label>
    <select id="conversionType" class="select-field">
      <option value="">-- Select Conversion --</option>
      <option value="c_to_f">Celsius → Fahrenheit</option>
      <option value="f_to_c">Fahrenheit → Celsius</option>
      <option value="c_to_k">Celsius → Kelvin</option>
      <option value="k_to_c">Kelvin → Celsius</option>
      <option value="f_to_k">Fahrenheit → Kelvin</option>
      <option value="k_to_f">Kelvin → Fahrenheit</option>
    </select>

    <button class="convert-btn" onclick="convertTemperature()">
      Convert Temperature
    </button>

    <div class="result-box" id="resultBox">
      <div class="result-label" id="resultLabel"></div>
      <div class="result-value" id="resultValue"></div>
      <div class="result-unit" id="resultUnit"></div>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="formula-box" id="formulaBox">
      <div class="formula-label">Formula Used</div>
      <div class="formula-text" id="formulaText"></div>
    </div>

    <div class="divider"></div>

    <p style="font-size: 13px; color: var(--hint); text-align: center;">
      Enter a value and select a conversion type to get result
    </p>

  </div>

  <div class="footer">
    Made with HTML, CSS &amp; JavaScript
  </div>

  <script>

    // toggle dark / light mode
    function toggleMode() {
      var html = document.documentElement;
      var btn = document.getElementById("toggleBtn");

      if (html.getAttribute("data-theme") === "dark") {
        html.setAttribute("data-theme", "light");
        btn.innerHTML = "🌙 Dark Mode";
      } else {
        html.setAttribute("data-theme", "dark");
        btn.innerHTML = "☀️ Light Mode";
      }
    }

    // convert temperature
    function convertTemperature() {

      var inputValue = document.getElementById("tempInput").value;
      var conversionType = document.getElementById("conversionType").value;

      var resultBox = document.getElementById("resultBox");
      var resultLabel = document.getElementById("resultLabel");
      var resultValue = document.getElementById("resultValue");
      var resultUnit = document.getElementById("resultUnit");
      var errorMsg = document.getElementById("errorMsg");
      var formulaBox = document.getElementById("formulaBox");
      var formulaText = document.getElementById("formulaText");

      // clear old result
      resultLabel.innerHTML = "";
      resultValue.innerHTML = "";
      resultUnit.innerHTML = "";
      errorMsg.innerHTML = "";
      resultBox.className = "result-box";
      formulaBox.className = "formula-box";

      // check if input is empty
      if (inputValue === "" || inputValue === null) {
        resultBox.className = "result-box error";
        errorMsg.innerHTML = "⚠️ Please enter a temperature value first!";
        return;
      }

      // check if conversion type is selected
      if (conversionType === "") {
        resultBox.className = "result-box error";
        errorMsg.innerHTML = "⚠️ Please select a conversion type!";
        return;
      }

      var temp = parseFloat(inputValue);

      // check valid number
      if (isNaN(temp)) {
        resultBox.className = "result-box error";
        errorMsg.innerHTML = "⚠️ Please enter a valid number!";
        return;
      }

      var result = 0;
      var fromUnit = "";
      var toUnit = "";
      var formula = "";

      if (conversionType === "c_to_f") {
        result = (temp * 9/5) + 32;
        fromUnit = "°C"; toUnit = "°F";
        formula = "°F = (°C × 9/5) + 32";
      }
      else if (conversionType === "f_to_c") {
        result = (temp - 32) * 5/9;
        fromUnit = "°F"; toUnit = "°C";
        formula = "°C = (°F - 32) × 5/9";
      }
      else if (conversionType === "c_to_k") {
        result = temp + 273.15;
        fromUnit = "°C"; toUnit = "K";
        formula = "K = °C + 273.15";
      }
      else if (conversionType === "k_to_c") {
        if (temp < 0) {
          resultBox.className = "result-box error";
          errorMsg.innerHTML = "⚠️ Kelvin value cannot be less than 0!";
          return;
        }
        result = temp - 273.15;
        fromUnit = "K"; toUnit = "°C";
        formula = "°C = K - 273.15";
      }
      else if (conversionType === "f_to_k") {
        result = (temp - 32) * 5/9 + 273.15;
        fromUnit = "°F"; toUnit = "K";
        formula = "K = (°F - 32) × 5/9 + 273.15";
      }
      else if (conversionType === "k_to_f") {
        if (temp < 0) {
          resultBox.className = "result-box error";
          errorMsg.innerHTML = "⚠️ Kelvin value cannot be less than 0!";
          return;
        }
        result = (temp - 273.15) * 9/5 + 32;
        fromUnit = "K"; toUnit = "°F";
        formula = "°F = (K - 273.15) × 9/5 + 32";
      }

      result = Math.round(result * 100) / 100;

      resultBox.className = "result-box success";
      resultLabel.innerHTML = "Converted Result";
      resultValue.innerHTML = result + " " + toUnit;
      resultUnit.innerHTML = temp + fromUnit + " = " + result + toUnit;

      formulaBox.className = "formula-box show";
      formulaText.innerHTML = formula;
    }

    // enter key support
    document.getElementById("tempInput").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        convertTemperature();
      }
    });

  </script>

</body>
</html>
